name: Update Playlist

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python build.py
      - run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add playlist.m3u epg.xml.gz ted.m3u
          git diff --cached --quiet || git commit -m "Auto-update $(date -u +%Y-%m-%d\ %H:%M)"
          git push
