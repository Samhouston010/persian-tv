name: YouTube Wildlife Live

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes — HLS manifest URLs expire in a few hours
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yt-dlp
      - run: python youtube_wildlife.py
      - run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add youtube_wildlife.m3u
          git diff --cached --quiet || git commit -m "YouTube wildlife refresh $(date -u +%H:%M)"
          git push
      - name: Purge playlist proxy cache
        run: curl -s "https://persian-tv-playlist-proxy.samhouston010.workers.dev/purge?token=${{ secrets.PURGE_TOKEN }}"
